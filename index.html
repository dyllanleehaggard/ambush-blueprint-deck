<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevating the St. Louis Ambush — Strategic Blueprint</title>
<meta name="description" content="A strategic blueprint for the St. Louis Ambush. Prepared by Dyllan Haggard.">

<!-- Fonts: Bebas Neue (display), DM Sans (body), JetBrains Mono (data) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --bg:          #0A0E12;
  --bg-alt:      #13181F;
  --bg-card:     #1A2129;
  --bg-light:    #F5F0E6;
  --ink:         #F5F0E6;
  --ink-dark:    #0A0E12;
  --mute:        #9AA5B1;
  --mute-dark:   #5A6573;
  --divider:     #2A3440;
  --teal:        #00B4A6;
  --teal-dark:   #00827A;
  --pink:        #F4587C;
  --pink-dark:   #C8425E;
  --amber:       #F2A93B;
  --red:         #E11D2C;

  --f-display:   'Bebas Neue', 'Impact', sans-serif;
  --f-body:      'DM Sans', -apple-system, sans-serif;
  --f-mono:      'JetBrains Mono', 'Courier New', monospace;

  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in:     cubic-bezier(0.7, 0, 0.84, 0);
}

/* ===== RESET + BASE ===== */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--f-body);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

/* ===== FILM GRAIN OVERLAY ===== */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  opacity: 0.03;
  z-index: 9999;
  mix-blend-mode: overlay;
}

/* ===== DECK CONTAINER ===== */
.deck {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: clamp(2rem, 4vw, 4rem) clamp(2rem, 5vw, 5rem);
  opacity: 0;
  visibility: hidden;
  transform: scale(1.02);
  transition: opacity 0.4s var(--ease-out), transform 0.5s var(--ease-out), visibility 0s linear 0.4s;
}
.slide.active {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
  transition: opacity 0.6s var(--ease-out), transform 0.7s var(--ease-out), visibility 0s;
}
.slide.prev {
  transform: scale(0.98) translateX(-2%);
}

/* ===== CHROME (top/bottom bars on every slide) ===== */
.chrome-top, .chrome-bottom {
  position: absolute;
  left: clamp(2rem, 5vw, 5rem);
  right: clamp(2rem, 5vw, 5rem);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mute-dark);
  pointer-events: none;
  z-index: 10;
}
.chrome-top { top: 1.5rem; }
.chrome-bottom { bottom: 1.5rem; }
.chrome-top .brand { color: var(--mute); display: flex; align-items: center; gap: 0.6rem; font-weight: 700; }
.chrome-top .brand::before {
  content: ''; width: 10px; height: 10px; background: var(--red); display: inline-block;
}
.chrome-top .section { color: var(--mute); }
.chrome-bottom .signature { font-weight: 500; }
.chrome-bottom .counter { font-variant-numeric: tabular-nums; font-weight: 500; }

/* ===== CORNER REGISTRATION MARKS ===== */
.slide::before, .slide::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border: 1px solid var(--divider);
  pointer-events: none;
  opacity: 0.6;
}
.slide::before { top: 1rem; left: 1rem; border-right: 0; border-bottom: 0; }
.slide::after { bottom: 1rem; right: 1rem; border-left: 0; border-top: 0; }

/* ===== GIANT SLIDE NUMBER WATERMARK ===== */
.slide-watermark {
  position: absolute;
  bottom: -4rem;
  right: -2rem;
  font-family: var(--f-display);
  font-size: clamp(18rem, 32vw, 36rem);
  font-weight: 400;
  line-height: 0.85;
  color: var(--bg-alt);
  letter-spacing: -0.04em;
  pointer-events: none;
  user-select: none;
  z-index: 0;
  opacity: 0.5;
}

/* ===== TYPOGRAPHY ===== */
.kicker {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--teal);
  font-weight: 500;
  margin-bottom: 1rem;
  display: inline-block;
}
.kicker.pink { color: var(--pink); }
.kicker.amber { color: var(--amber); }
.kicker.mute { color: var(--mute); }

.kicker .dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: currentColor;
  border-radius: 50%;
  margin-right: 0.6em;
  vertical-align: middle;
  margin-top: -2px;
}

h1, h2, h3, .title {
  font-family: var(--f-display);
  font-weight: 400;
  line-height: 0.95;
  letter-spacing: -0.01em;
  color: var(--ink);
}
h1 { font-size: clamp(3.5rem, 7vw, 7rem); }
h2 { font-size: clamp(2.5rem, 5vw, 4.5rem); }
h3 { font-size: clamp(1.5rem, 2.5vw, 2.25rem); }

.subtitle {
  font-family: var(--f-body);
  font-size: clamp(1rem, 1.3vw, 1.25rem);
  line-height: 1.5;
  color: var(--mute);
  font-style: italic;
  font-weight: 400;
  max-width: 70ch;
  margin-top: 1.25rem;
}

.body-text {
  font-family: var(--f-body);
  font-size: clamp(0.95rem, 1.1vw, 1.05rem);
  line-height: 1.6;
  color: var(--ink);
  max-width: 65ch;
}

.mono { font-family: var(--f-mono); }
.display { font-family: var(--f-display); letter-spacing: 0; }

/* ===== SLIDE CONTENT CONTAINER ===== */
.slide-inner {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: clamp(1rem, 3vh, 3rem);
  z-index: 1;
}
.slide-inner.centered {
  justify-content: center;
  padding-top: 0;
}

/* Stagger-in animation for active slide */
.slide.active .reveal {
  animation: riseIn 0.8s var(--ease-out) both;
}
.slide.active .reveal-1 { animation-delay: 0.05s; }
.slide.active .reveal-2 { animation-delay: 0.15s; }
.slide.active .reveal-3 { animation-delay: 0.25s; }
.slide.active .reveal-4 { animation-delay: 0.35s; }
.slide.active .reveal-5 { animation-delay: 0.45s; }
.slide.active .reveal-6 { animation-delay: 0.55s; }
.slide.active .reveal-7 { animation-delay: 0.65s; }
.slide.active .reveal-8 { animation-delay: 0.75s; }

@keyframes riseIn {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.slide.active .reveal-line {
  animation: drawLine 0.9s var(--ease-out) 0.2s both;
  transform-origin: left center;
}
@keyframes drawLine {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}

/* ===== NAVIGATION UI ===== */
.nav-controls {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  display: flex;
  gap: 0.5rem;
  z-index: 100;
}
.nav-btn {
  width: 44px; height: 44px;
  background: rgba(245, 240, 230, 0.05);
  border: 1px solid var(--divider);
  color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  backdrop-filter: blur(12px);
}
.nav-btn:hover { background: rgba(245, 240, 230, 0.12); border-color: var(--teal); transform: translateY(-2px); }
.nav-btn:active { transform: translateY(0); }
.nav-btn svg { width: 18px; height: 18px; }
.nav-btn[disabled] { opacity: 0.3; cursor: not-allowed; }

/* Progress bar at top of viewport */
.progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  background: var(--teal);
  z-index: 200;
  transition: width 0.4s var(--ease-out);
}
.progress-bar::after {
  content: '';
  position: absolute;
  right: 0; top: 0;
  width: 40px; height: 100%;
  background: linear-gradient(90deg, transparent, var(--teal));
  filter: blur(4px);
}

/* Overview grid (toggled with Esc) */
.overview {
  position: fixed;
  inset: 0;
  background: rgba(10, 14, 18, 0.98);
  z-index: 500;
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem;
  padding: 3rem;
  overflow-y: auto;
  backdrop-filter: blur(20px);
}
.overview.open { display: grid; }
.overview-tile {
  aspect-ratio: 16/9;
  background: var(--bg-alt);
  border: 1px solid var(--divider);
  padding: 1rem;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
}
.overview-tile:hover { border-color: var(--teal); transform: scale(1.02); }
.overview-tile .num { font-family: var(--f-mono); font-size: 10px; color: var(--mute); letter-spacing: 0.15em; }
.overview-tile .label { font-family: var(--f-display); font-size: 1.1rem; line-height: 1.05; color: var(--ink); margin-top: 0.5rem; letter-spacing: 0.01em; }
.overview-tile.current { border-color: var(--teal); background: var(--bg-card); }

/* Help panel */
.help-panel {
  position: fixed;
  bottom: 2rem; left: 2rem;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mute-dark);
  z-index: 100;
  pointer-events: none;
}
.help-panel kbd {
  display: inline-block;
  padding: 2px 6px;
  background: var(--bg-alt);
  border: 1px solid var(--divider);
  border-radius: 2px;
  color: var(--mute);
  margin: 0 2px;
}

/* ===== SLIDE-TYPE: COVER ===== */
.slide-cover {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(0, 180, 166, 0.08), transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(244, 88, 124, 0.06), transparent 60%);
}
.cover-accent {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 8px;
  background: var(--red);
  z-index: 2;
}
.cover-title {
  font-family: var(--f-display);
  font-size: clamp(5rem, 11vw, 11rem);
  line-height: 0.85;
  letter-spacing: -0.02em;
  color: var(--ink);
  text-transform: uppercase;
}
.cover-title .line { display: block; }
.cover-title .underlined { position: relative; display: inline-block; }
.cover-title .underlined::after {
  content: '';
  position: absolute;
  bottom: 0.08em;
  left: 0;
  width: 100%; height: 3px;
  background: var(--teal);
}

/* ===== SLIDE-TYPE: DIVIDER ===== */
.slide-divider {
  background: var(--bg);
  overflow: hidden;
}
.slide-divider::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0, 180, 166, 0.04) 0%, transparent 50%);
  z-index: 0;
}
.divider-vert {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 8px;
  background: var(--teal);
  z-index: 2;
}
.divider-part {
  font-family: var(--f-mono);
  font-size: 14px;
  letter-spacing: 0.3em;
  color: var(--teal);
  font-weight: 500;
  margin-bottom: 1rem;
}
.divider-title {
  font-family: var(--f-display);
  font-size: clamp(6rem, 13vw, 14rem);
  line-height: 0.85;
  letter-spacing: -0.02em;
  color: var(--ink);
  text-transform: uppercase;
}
.divider-title .line { display: block; }

/* ===== CARDS / CONTENT ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--divider);
  padding: 1.5rem;
  position: relative;
}
.card .accent-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--teal);
}
.card.pink .accent-bar { background: var(--pink); }
.card.amber .accent-bar { background: var(--amber); }

.card h3 {
  font-family: var(--f-display);
  font-size: 1.4rem;
  color: var(--teal);
  letter-spacing: 0.03em;
  margin-bottom: 0.7rem;
}
.card.pink h3 { color: var(--pink); }
.card.amber h3 { color: var(--amber); }

.card p { font-size: 0.95rem; line-height: 1.55; color: var(--ink); }

/* Stat block */
.stat {
  background: var(--bg-card);
  border: 1px solid var(--divider);
  padding: 1.25rem 1.5rem;
  position: relative;
  overflow: hidden;
}
.stat::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--teal);
}
.stat.pink::before { background: var(--pink); }
.stat .value {
  font-family: var(--f-display);
  font-size: clamp(2rem, 3.5vw, 3rem);
  line-height: 1;
  color: var(--teal);
  letter-spacing: 0.01em;
}
.stat.pink .value { color: var(--pink); }
.stat .label {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mute);
  margin-top: 0.6rem;
}

/* Bullet list */
ul.bullets {
  list-style: none;
  padding: 0;
}
ul.bullets li {
  position: relative;
  padding-left: 1.8rem;
  margin-bottom: 0.8rem;
  font-size: 1.02rem;
  line-height: 1.5;
  color: var(--ink);
}
ul.bullets li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0.5em;
  width: 10px; height: 10px;
  background: var(--teal);
  transform: translateY(-50%);
}
ul.bullets.pink li::before { background: var(--pink); }
ul.bullets.amber li::before { background: var(--amber); }

/* TODO badge */
.todo {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--amber);
  color: var(--ink-dark);
  padding: 0.5rem 0.8rem;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 700;
}
.todo::before { content: '[ TODO ]'; opacity: 0.7; }

/* Image placeholder */
.img-placeholder {
  background: var(--bg-card);
  border: 1px dashed var(--divider);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--mute-dark);
  position: relative;
}
.img-placeholder::before, .img-placeholder::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border: 1px solid var(--mute-dark);
}
.img-placeholder::before { top: 6px; left: 6px; border-right: 0; border-bottom: 0; }
.img-placeholder::after { bottom: 6px; right: 6px; border-left: 0; border-top: 0; }

/* Tables */
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.95rem;
}
.table th {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--mute);
  text-align: left;
  padding: 0.8rem 1rem;
  background: var(--bg-alt);
  border: 1px solid var(--divider);
  font-weight: 500;
}
.table th.teal { color: var(--teal); }
.table th.pink { color: var(--pink); }
.table td {
  padding: 0.8rem 1rem;
  border: 1px solid var(--divider);
  color: var(--ink);
  background: var(--bg);
}
.table tr:nth-child(even) td { background: var(--bg-alt); }
.table td.mono { font-family: var(--f-mono); font-size: 0.9rem; }
.table td.title-cell { font-family: var(--f-display); font-size: 1.05rem; letter-spacing: 0.02em; color: var(--ink); }

/* Pullquote strip */
.pullquote {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.8rem 0 0.8rem 0;
  border-left: 4px solid var(--amber);
  padding-left: 1.2rem;
  font-style: italic;
  color: var(--ink);
  font-size: 1.05rem;
  max-width: 90%;
}
.pullquote.pink { border-left-color: var(--pink); }
.pullquote.teal { border-left-color: var(--teal); }

/* Chart container */
.chart-wrap {
  position: relative;
  width: 100%;
}

/* Utility grid */
.grid { display: grid; gap: 1rem; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-5 { grid-template-columns: repeat(5, 1fr); }
.gap-sm { gap: 0.6rem; }
.gap-lg { gap: 1.5rem; }

/* Two-column layout helper */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
  margin-top: 1.5rem;
}
.two-col-head {
  font-family: var(--f-display);
  font-size: 1.5rem;
  letter-spacing: 0.03em;
  padding-left: 0.8rem;
  border-left: 4px solid var(--teal);
  margin-bottom: 1rem;
}
.two-col-head.pink { border-left-color: var(--pink); color: var(--pink); }
.two-col-head.teal { color: var(--teal); }

/* Part watermark for section-header slides */
.part-num {
  position: absolute;
  top: 40%;
  right: 3rem;
  font-family: var(--f-display);
  font-size: 22rem;
  color: var(--bg-alt);
  line-height: 0.8;
  z-index: 0;
  opacity: 0.6;
  pointer-events: none;
}

/* Responsive guard */
@media (max-width: 900px) {
  .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr 1fr; }
  .two-col { grid-template-columns: 1fr; }
  .slide { padding: 2rem 1.5rem; }
  .chrome-top, .chrome-bottom { left: 1.5rem; right: 1.5rem; }
}

/* Print / fullscreen hints */
:fullscreen .nav-controls, :fullscreen .help-panel { opacity: 0.3; transition: opacity 0.2s; }
:fullscreen .nav-controls:hover, :fullscreen .help-panel:hover { opacity: 1; }

/* Hide scrollbars on overflow containers when presenting */
.slide-inner { overflow: hidden; }

</style>
</head>
<body>

<!-- Progress bar -->
<div class="progress-bar" id="progress" style="width: 0%"></div>

<!-- Main deck -->
<div class="deck" id="deck"></div>

<!-- Navigation controls -->
<div class="nav-controls">
  <button class="nav-btn" id="prev" aria-label="Previous">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>
  <button class="nav-btn" id="overview-toggle" aria-label="Overview">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
  </button>
  <button class="nav-btn" id="next" aria-label="Next">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </button>
</div>

<!-- Help panel -->
<div class="help-panel">
  <kbd>←</kbd><kbd>→</kbd> navigate &nbsp; <kbd>ESC</kbd> overview &nbsp; <kbd>F</kbd> fullscreen
</div>

<!-- Overview grid (hidden by default) -->
<div class="overview" id="overview"></div>

<!-- Slide content gets injected by slides.js -->
<script src="slides.js"></script>
<script>
/* ===== NAVIGATION ENGINE ===== */
(function(){
  // Defensive check: ensure SLIDES loaded
  if (typeof SLIDES === 'undefined' && !window.SLIDES) {
    document.body.innerHTML = '<div style="color:#F5F0E6;font-family:monospace;padding:3rem;background:#0A0E12;min-height:100vh;">' +
      '<h1 style="color:#E11D2C;">ERROR: slides.js did not load</h1>' +
      '<p>Check that slides.js is in the same folder as index.html.</p>' +
      '<p>If deploying to GitHub Pages, wait 1-2 minutes after pushing.</p>' +
      '<p style="color:#9AA5B1;margin-top:2rem;font-size:0.9rem;">Open browser console (F12) for more info.</p>' +
      '</div>';
    console.error('SLIDES is not defined. slides.js failed to load or parse.');
    return;
  }
  var SLIDE_DATA = window.SLIDES || SLIDES;
  const deck = document.getElementById('deck');
  const progress = document.getElementById('progress');
  const overview = document.getElementById('overview');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');
  const overviewBtn = document.getElementById('overview-toggle');

  // SLIDES is defined in slides.js as array of {section, num, render} objects
  const TOTAL = SLIDE_DATA.length;
  let current = 0;

  // Read initial slide from hash
  const hashMatch = window.location.hash.match(/^#(\d+)$/);
  if (hashMatch) {
    const idx = parseInt(hashMatch[1], 10) - 1;
    if (idx >= 0 && idx < TOTAL) current = idx;
  }

  // Render all slides as DOM elements
  function renderSlides() {
    SLIDE_DATA.forEach((s, i) => {
      const el = document.createElement('section');
      el.className = 'slide ' + (s.cls || '');
      el.setAttribute('data-slide', i + 1);
      el.innerHTML = s.render(i + 1, TOTAL);
      deck.appendChild(el);
    });
  }

  function renderOverview() {
    overview.innerHTML = SLIDE_DATA.map((s, i) => `
      <div class="overview-tile ${i === current ? 'current' : ''}" data-idx="${i}">
        <div class="num">${String(i + 1).padStart(3, '0')} / ${String(TOTAL).padStart(3, '0')}</div>
        <div class="label">${s.title || 'Slide ' + (i+1)}</div>
      </div>
    `).join('');
    overview.querySelectorAll('.overview-tile').forEach(tile => {
      tile.addEventListener('click', () => {
        goTo(parseInt(tile.dataset.idx, 10));
        closeOverview();
      });
    });
  }

  function updateProgress() {
    const pct = ((current + 1) / TOTAL) * 100;
    progress.style.width = pct + '%';
  }

  function activateSlide(idx) {
    const slides = deck.querySelectorAll('.slide');
    slides.forEach((s, i) => {
      s.classList.remove('active', 'prev');
      if (i === idx) s.classList.add('active');
      if (i === idx - 1) s.classList.add('prev');
    });
    // Trigger any chart redraws for slides with data-chart attribute
    const active = slides[idx];
    if (active) {
      const chartInitFns = window.__chartInit || {};
      active.querySelectorAll('[data-chart]').forEach(el => {
        const fn = chartInitFns[el.dataset.chart];
        if (fn && !el.dataset.rendered) {
          setTimeout(() => { fn(el); el.dataset.rendered = '1'; }, 300);
        }
      });
      // Animate any number counters
      active.querySelectorAll('[data-count]').forEach(el => {
        if (!el.dataset.counted) {
          animateCounter(el);
          el.dataset.counted = '1';
        }
      });
    }
    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === TOTAL - 1;
    window.location.hash = idx + 1;
    updateProgress();
  }

  function animateCounter(el) {
    const target = parseFloat(el.dataset.count);
    const duration = 1200;
    const prefix = el.dataset.prefix || '';
    const suffix = el.dataset.suffix || '';
    const decimals = parseInt(el.dataset.decimals || '0', 10);
    const start = performance.now();
    function tick(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const val = target * eased;
      el.textContent = prefix + val.toFixed(decimals) + suffix;
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function goTo(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    current = idx;
    activateSlide(idx);
  }
  function next() { goTo(current + 1); }
  function prev() { goTo(current - 1); }

  function openOverview() {
    renderOverview();
    overview.classList.add('open');
  }
  function closeOverview() {
    overview.classList.remove('open');
  }
  function toggleOverview() {
    if (overview.classList.contains('open')) closeOverview();
    else openOverview();
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (overview.classList.contains('open')) {
      if (e.key === 'Escape') closeOverview();
      return;
    }
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); next(); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
    else if (e.key === 'Home') { e.preventDefault(); goTo(0); }
    else if (e.key === 'End') { e.preventDefault(); goTo(TOTAL - 1); }
    else if (e.key === 'Escape') toggleOverview();
    else if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
  });

  // Touch swipe
  let touchStart = null;
  deck.addEventListener('touchstart', (e) => { touchStart = e.touches[0].clientX; }, { passive: true });
  deck.addEventListener('touchend', (e) => {
    if (touchStart === null) return;
    const dx = e.changedTouches[0].clientX - touchStart;
    if (Math.abs(dx) > 50) dx < 0 ? next() : prev();
    touchStart = null;
  }, { passive: true });

  // Button wiring
  prevBtn.addEventListener('click', prev);
  nextBtn.addEventListener('click', next);
  overviewBtn.addEventListener('click', toggleOverview);

  // Hash change
  window.addEventListener('hashchange', () => {
    const m = window.location.hash.match(/^#(\d+)$/);
    if (m) {
      const idx = parseInt(m[1], 10) - 1;
      if (idx >= 0 && idx < TOTAL && idx !== current) goTo(idx);
    }
  });

  // Init
  renderSlides();
  activateSlide(current);
})();
</script>
</body>
</html>
